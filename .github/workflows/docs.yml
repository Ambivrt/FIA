name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/generate-*.ts'
      - 'src/api/openapi.ts'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm ci

      - run: pip install mkdocs-material mkdocs-swagger-ui-tag

      - run: npm run docs:generate

      - run: mkdocs build -f docs/mkdocs.yml

      - run: mkdocs gh-deploy -f docs/mkdocs.yml --force
