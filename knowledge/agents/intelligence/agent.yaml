name: Intelligence Agent
slug: intelligence
version: 1.1.0

skills:
  - shared:forefront-identity
  - shared:data-driven-reasoning
  - shared:escalation-protocol
  - agent:source-monitoring
  - agent:relevance-scoring
  - agent:briefing-generation

routing:
  default: claude-sonnet
  deep_analysis: claude-opus
  search: google-search

system_context:
  - context/watch-domains.yaml
  - context/scoring-criteria.yaml

task_context:
  morning_scan:
    - context/templates/morning-scan.md
  midday_sweep:
    - context/templates/morning-scan.md
  weekly_intelligence:
    - context/templates/weekly-brief.md
  rapid_response:
    - context/templates/rapid-response.md

tools:
  - gws:drive
  - gws:docs
  - gws:sheets

autonomy: autonomous
escalation_threshold: 3
sample_review_rate: 0.2
max_iterations: 5

self_eval:
  enabled: true
  model: claude-sonnet
  criteria:
    - "Är alla fynd relevanta för Forefront och bevakningsdomänerna?"
    - "Är scoring-motiveringar tydliga och konsekventa?"
    - "Är briefen koncis och handlingsorienterad?"
  threshold: 0.7

writable:
  - memory/source-history.json
  - memory/scoring-calibration.json
  - memory/learnings.json

triggers:
  - name: rapid_response_to_content
    description: "Skapar rapid-response-artikel från högscorade fynd"
    on: task_completed
    condition:
      task_type: [morning_scan, midday_sweep]
      output_field: "suggested_action"
      output_value: "rapid_response"
    action:
      type: create_task
      target_agent: content
      task_type: rapid_response_article
      priority: high
      context_fields: [title, content_json.summary, content_json.implications]
    requires_approval: false
    enabled: true

  - name: strategy_input_to_strategy
    description: "Skickar strategiskt relevant fynd till Strategy Agent"
    on: task_completed
    condition:
      task_type: [morning_scan, midday_sweep]
      output_field: "suggested_action"
      output_value: "strategy_input"
    action:
      type: create_task
      target_agent: strategy
      task_type: strategic_input
      priority: normal
      context_fields: [title, content_json.summary, content_json.implications]
    requires_approval: true
    enabled: true

  - name: escalate_critical
    description: "Eskalerar kritiska fynd till Orchestrator via Slack"
    on: task_completed
    condition:
      task_type: [morning_scan, midday_sweep]
      output_field: "suggested_action"
      output_value: "escalate"
    action:
      type: notify_slack
      channel: "#fia-orchestrator"
    requires_approval: false
    enabled: true
