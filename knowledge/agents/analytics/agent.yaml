name: Analytics Agent
slug: analytics
version: 1.1.0
skills:
  - shared:forefront-identity
  - shared:data-driven-reasoning
  - shared:gdpr-compliance
  - shared:escalation-protocol
  - agent:reporting
  - agent:anomaly-detection
routing:
  default: claude-sonnet
  insights: claude-opus
  report_writing: claude-opus
system_context:
  - context/drive-folders.md
task_context:
  morning_pulse:
    - context/templates/morning-pulse.md
  weekly_report:
    - context/templates/weekly-report.md
  quarterly_review:
    - context/templates/quarterly-review.md
  anomaly_detection:
    - context/templates/anomaly-detection.md
tools:
  - ga4
  - "gws:sheets"
  - "gws:drive"
  - hubspot
  - workvivo
autonomy: autonomous
compliance_mode: balanced
escalation_threshold: 3
sample_review_rate: 0.05
max_iterations: 5
writable:
  - memory/baseline-metrics.json

triggers:
  - name: anomaly_escalation
    description: "Eskalerar anomalier till Orchestrator"
    on: task_completed
    condition:
      task_type: [anomaly_detection]
      score_field: "severity"
      score_above: 0.8
    action:
      type: escalate
      channel: "#fia-orchestrator"
    requires_approval: false
    enabled: true
