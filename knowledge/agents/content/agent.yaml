name: Content Agent
slug: content
version: 1.0.0
skills:
  - shared:forefront-identity
  - shared:brand-compliance
  - shared:swedish-tone
  - shared:escalation-protocol
  - agent:content-production
  - agent:channel-adaptation
routing:
  default: claude-opus
  metadata: claude-sonnet
  alt_text: claude-sonnet
  ab_variants: claude-sonnet
  images: nano-banana-2
system_context:
  - context/tone-examples.md
  - context/drive-folders.md
task_context:
  blog_post:
    - context/templates/blog-post.md
    - context/few-shot/blog-good.md
    - context/few-shot/blog-bad.md
  linkedin:
    - context/templates/linkedin-post.md
    - context/few-shot/linkedin-good.md
    - context/few-shot/linkedin-bad.md
  newsletter:
    - context/templates/newsletter.md
    - context/few-shot/newsletter-good.md
    - context/few-shot/newsletter-bad.md
  case_study:
    - context/templates/case-study.md
    - context/few-shot/case-study-good.md
    - context/few-shot/case-study-bad.md
  whitepaper:
    - context/templates/whitepaper.md
  metadata:
    - context/templates/metadata.md
  alt_text:
    - context/templates/alt-text.md
  images:
    - context/templates/images.md
tools:
  - buffer
  - workvivo
  - "gws:drive"
  - "gws:docs"
autonomy: autonomous
compliance_mode: strict
escalation_threshold: 3
sample_review_rate: 0.2
max_iterations: 5
self_eval:
  enabled: true
  model: claude-sonnet
  criteria:
    - "Följer texten tonalitetsreglerna? (konkret, aktivt språk, tydlig poäng)"
    - "Finns faktapåståenden utan källa eller stöd? (erfarenhetsbaserade observationer och åsikter i thought leadership behöver inte källhänvisning)"
    - "Passar längd och format för målkanalen?"
  threshold: 0.7
writable:
  - memory/learnings.json
  - memory/feedback-log.json
