name: Campaign Agent
slug: campaign
version: 1.1.0
skills:
  - shared:forefront-identity
  - shared:brand-compliance
  - shared:swedish-tone
  - shared:data-driven-reasoning
  - shared:escalation-protocol
  - agent:campaign-execution
  - agent:ab-testing
routing:
  default: claude-opus
  ab_variants: claude-sonnet
  segmentation: claude-sonnet
system_context: []
task_context:
  email_sequence:
    - context/templates/email-sequence.md
  ad_copy:
    - context/templates/ad-copy.md
  landing_page:
    - context/templates/landing-page.md
tools:
  - hubspot
  - linkedin
  - buffer
autonomy: autonomous
escalation_threshold: 3
sample_review_rate: 0.33
max_iterations: 5
budget_limit_sek: 10000
self_eval:
  enabled: true
  model: claude-sonnet
  criteria:
    - "Matchar kampanjens budskap varumärkesplattformen?"
    - "Är CTA:n tydlig och handlingsorienterad?"
    - "Finns segmentering och A/B-variant korrekt angiven?"
  threshold: 0.7
writable:
  - memory/ab-test-results.json
