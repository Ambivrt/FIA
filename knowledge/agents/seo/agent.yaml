name: SEO Agent
slug: seo
version: 1.1.0
skills:
  - shared:forefront-identity
  - shared:data-driven-reasoning
  - shared:escalation-protocol
  - agent:keyword-research
  - agent:on-page-optimization
routing:
  default: google-search
  bulk_optimization: claude-sonnet
  content_recommendations: claude-opus
system_context:
  - context/geo-guidelines.md
  - context/drive-folders.md
task_context:
  seo_audit:
    - context/templates/seo-audit.md
  keyword_research:
    - context/templates/keyword-research.md
  bulk_optimization:
    - context/templates/bulk-optimization.md
  content_recommendations:
    - context/templates/content-recommendations.md
tools:
  - "gws:drive"
  - "gws:analytics"
  - "gws:sheets"
autonomy: autonomous
escalation_threshold: 3
sample_review_rate: 0.05
max_iterations: 5
writable:
  - memory/keyword-rankings.json
  - memory/opportunities.json

triggers:
  - name: seo_recommendations_to_content
    description: "Skapar content-optimeringsuppgifter från SEO-audit"
    on: task_approved
    condition:
      task_type: [seo_audit]
      output_field: "has_content_recommendations"
      output_value: "true"
    action:
      type: create_task
      target_agent: content
      task_type: seo_optimization
      priority: normal
      context_fields: [content_json.recommendations]
    requires_approval: true
    enabled: true
