name: Strategy Agent
slug: strategy
version: 1.1.0
skills:
  - shared:forefront-identity
  - shared:brand-compliance
  - shared:data-driven-reasoning
  - shared:escalation-protocol
  - agent:strategic-planning
  - agent:market-analysis
routing:
  default: claude-opus
  research: google-search
  trend_analysis: google-search
system_context:
  - context/planning-framework.md
  - context/drive-folders.md
task_context:
  quarterly_plan:
    - context/templates/quarterly-plan.md
  monthly_plan:
    - context/templates/monthly-plan.md
  campaign_brief:
    - context/templates/campaign-brief.md
tools:
  - "gws:drive"
  - "gws:analytics"
  - "gws:calendar"
  - "gws:sheets"
  - hubspot
autonomy: semi-autonomous
escalation_threshold: 1
sample_review_rate: 1.0
max_iterations: 5
writable:
  - memory/campaign-history.json

triggers:
  - name: brief_to_content
    description: "Skapar content-tasks från godkänd kampanjbrief"
    on: task_activated
    condition:
      task_type: [campaign_brief]
    action:
      type: create_task
      target_agent: content
      task_type: campaign_content
      priority: normal
      context_fields: [title, content_json]
    requires_approval: false
    enabled: true

  - name: brief_to_campaign
    description: "Skapar kampanj-setup från godkänd kampanjbrief"
    on: task_activated
    condition:
      task_type: [campaign_brief]
    action:
      type: create_task
      target_agent: campaign
      task_type: campaign_setup
      priority: normal
      context_fields: [title, content_json]
    requires_approval: true
    enabled: true
